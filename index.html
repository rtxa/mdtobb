<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="utf-8"/>
        <title>Markdown to BBCode</title>
        <script type="text/javascript" src="./scripts/marked.js"></script>
        <script type="text/javascript" src="./scripts/markdown-converter-util.js"></script>
    </head>
    <body>
        <div class="wrapper">
            <div class="container">
                <label>
                    <input id="useCodeTag" type="checkbox" onchange="convert();" checked>
                    Use <code>[code]</code> tags
                </label>
                <label>
                    <input id="formatCodeSpan" type="checkbox" onchange="convert();">
                    Format in-line code
                </label>
                <label>
                    <input id="addNewLine" type="checkbox" onchange="convert();"> <!-- i only use this for phpbb ForoActive, it uses a bad version -->
                    Add new line
                </label>
                <label>
                    <input id="addNewLineEndList" type="checkbox" onchange="convert();"> 
                    Add new line at end of list
                </label>
            </div>
            <div class="container">
                    <button id="style1" onclick="onClick_Style1();convert();">VBulletin AlliedMods</button>
                    <button id="style2" onclick="onClick_Style2();convert();">phpBB AGHL.RU</button>
                    <button id="style3" onclick="onClick_Style3();convert();">MyBB AMXX-ES</button>
                    <button id="style4" onclick="onClick_Style4();convert();">phpBB ForoActivo</button>
            </div>
            <div class="container">
                <input class="header" id="header1" placeholder="Header 1" onchange="convert();"/>
                <input class="header" id="header2" placeholder="Header 2" onchange="convert();"/>
                <input class="header" id="header3" placeholder="Header 3" onchange="convert();"/>
                <input class="header" id="header4" placeholder="Header 4" onchange="convert();"/>
            </div>
            <div class="container">
                <textarea id="markdownTextarea" onchange="convert();" onkeyup="convert();"
                    placeholder="Enter your Markdown text here"></textarea>
            </div>
            <div class="container">
                <textarea id="bbcodeTextarea" readonly="readonly"
                    placeholder="Result will appear here"></textarea>
            </div>
            <div= class="container">
                <button id="copyOutput" onclick="copyToClipboard();">Copy to clipboard</button>
            </div>
            <script src="script.js"></script>
        </div>
    </body>
</html>
